function generate() {
    const odai = odaiData[Math.floor(Math.random() * odaiData.length)];
    document.getElementById('odai-display').innerText = odai.text;
    document.getElementById('odai-category').innerText = odai.cat;

    const count = parseInt(document.getElementById('member-count').value);
    const shuffled = [...valueData].sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, count);

    const container = document.getElementById('value-container');
    container.innerHTML = '';
    
    selected.forEach((v, i) => {
        container.innerHTML += `
            <div class="value-card">
                <span class="member-label">班員 ${i + 1} の価値観</span>
                <span class="value-name">${v.name}</span>
                <div class="value-desc">${v.desc}</div>
            </div>
        `;
    });

    document.getElementById('odai-area').scrollIntoView({behavior: 'smooth'});
}
