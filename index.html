<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Alchemy | 役割分担型・アイデア錬成アプリ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3498db; --accent: #e67e22; --bg: #fdfdfd; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg); color: #333; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; width: 100%; text-align: center; }
        h1 { font-size: 2rem; color: #2c3e50; margin-bottom: 5px; letter-spacing: 2px; }
        .description { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 25px; }
        
        /* 人数設定 */
        .config-box { margin-bottom: 25px; background: #fff; padding: 15px 25px; border-radius: 50px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        label { font-weight: bold; margin-right: 12px; color: #555; }
        select { padding: 8px 15px; border-radius: 5px; border: 1px solid #ddd; font-size: 1rem; outline: none; }

        /* お題 */
        .odai-card { background: white; border-radius: 20px; padding: 35px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border-top: 10px solid var(--primary); margin-bottom: 35px; position: relative; }
        .odai-tag { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 4px 25px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }
        .odai-text { font-size: 1.6rem; font-weight: bold; color: #2c3e50; line-height: 1.5; }

        /* 価値観グリッド（担当者別） */
        .value-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .value-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 20px; text-align: left; position: relative; transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .value-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); border-color: var(--accent); }
        .member-id { background: var(--accent); color: white; padding: 3px 12px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .value-name { color: var(--accent); font-weight: bold; font-size: 1.1rem; border-bottom: 2px solid #fff5eb; margin-bottom: 10px; display: block; padding-bottom: 5px; }
        .value-desc { font-size: 0.88rem; color: #666; line-height: 1.6; }

        /* ボタン */
        button { background: #2ecc71; color: white; border: none; padding: 20px 50px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); transition: 0.3s; width: 100%; max-width: 350px; }
        button:hover { background: #27ae60; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(46, 204, 113, 0.5); }

        @media (max-width: 480px) { h1 { font-size: 1.6rem; } .odai-text { font-size: 1.3rem; } .value-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🧪 Value Alchemy</h1>
    <p class="description">各班員に割り振られた「価値観」を死守してアイデアを錬成せよ！</p>

    <div class="config-box">
        <label for="member-count">👥 班の人数:</label>
        <select id="member-count" onchange="generate()">
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5" selected>5人</option>
            <option value="6">6人</option>
            <option value="7">7人</option>
            <option value="8">8人</option>
            <option value="9">9人</option>
            <option value="10">10人</option>
        </select>
    </div>

    <div class="odai-card">
        <div id="odai-category" class="odai-tag">CATEGORY</div>
        <div id="odai-display" class="odai-text">ボタンを押して開始</div>
    </div>

    <div id="value-container" class="value-grid">
        </div>

    <button onclick="generate()">錬成（お題と役割を生成）</button>
</div>

// --- 価値観データ（10種類固定） ---
const valueData = [
    {id: 1, name: "極限の制約・ミニマリズム", desc: "お金や大掛かりな準備を一切排除し、最小限の要素だけで成立させること。"},

    {id: 4, name: "カオス・狂気・ユーモア", desc: "常識や論理を吹き飛ばす、思わず笑ってしまうような狂気を含んでいること。"},
    {id: 5, name: "強制的ルーティン", desc: "その場限りではなく、明日からも「息をするように」やってしまう持続可能な仕組み。"},
    {id: 6, name: "最新テクノロジーのハック", desc: "スマホ、SNS、AIなどを、本来の用途とは違う形で巧みに組み込むこと。"},
    {id: 7, name: "泥臭い身体性", desc: "あえて「汗をかく、移動する、直接触れ合う」などの物理的な動作を強制すること。"},
    {id: 8, name: "究極の心理的安全性", desc: "誰も恥をかかず、スキル不要で、「失敗」という概念すら存在しない空間。"},
    {id: 9, name: "無作為な巻き込み", desc: "内輪だけでなく、通りすがりの人や第三者を（無理なく）巻き込んでしまうこと。"},
    {id: 10, name: "無意識の利他・エコシステム", desc: "ただ楽しんでいるだけなのに、結果的に誰かを助けたり環境を良くすること。"}
];

function generate() {
    // 1. お題の抽選
    const odai = odaiData[Math.floor(Math.random() * odaiData.length)];
    document.getElementById('odai-display').innerText = odai.text;
    document.getElementById('odai-category').innerText = odai.cat;

    // 2. 人数に応じた枚数の決定（最大10枚）
    const memberCount = parseInt(document.getElementById('member-count').value);
    
    // 3. 価値観をシャッフル
    const shuffled = [...valueData].sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, memberCount);

    const container = document.getElementById('value-container');
    container.innerHTML = '';
    
    selected.forEach((v, index) => {
        container.innerHTML += `
            <div class="value-card">
                <div class="member-id">班員 ${index + 1} の担当</div>
                <span class="value-name">価値観 ${v.id}: ${v.name}</span>
                <div class="value-desc">${v.desc}</div>
            </div>
        `;
    });
}
</script>
</body>
</html>
